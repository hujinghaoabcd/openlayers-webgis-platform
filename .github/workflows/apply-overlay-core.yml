name: Apply overlay core

on:
  push:
    branches:
      - agent/overlay-core

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/overlay-core
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/patch-map-overlays.mjs
      - name: Commit generated overlay fix
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/widgets/src/overlays.ts
          git commit -m "fix: normalize polygon overlay anchors"
          git push
