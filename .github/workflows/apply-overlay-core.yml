name: Clean overlay temporary files

on:
  push:
    branches:
      - agent/overlay-core

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/overlay-core
      - name: Remove temporary assets
        run: |
          rm -f .github/workflows/apply-overlay-core.yml
          rm -f .github/workflows/overlay-diagnostics.yml
          rm -f .github/workflows/update-overlay-lock.yml
          rm -f scripts/patch-map-overlays.mjs
      - name: Commit cleanup
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove temporary overlay workflows"
          git push
