name: Refresh lockfile

on:
  push:
    branches: [agent/layer-core]

permissions:
  contents: write

jobs:
  refresh:
    if: ${{ !contains(github.event.head_commit.message, '[lockfile]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/layer-core
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --lockfile-only
      - name: Commit refreshed lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          if git diff --cached --quiet; then
            echo "Lockfile is already current."
            exit 0
          fi
          git commit -m "chore: refresh lockfile [lockfile]"
          git push origin HEAD:agent/layer-core
