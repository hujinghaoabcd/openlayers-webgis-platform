name: History diagnostics

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/core/src/**'
      - 'packages/interactions/**'
      - '.github/workflows/history-diagnostics.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Capture diagnostics
        shell: bash
        run: pnpm typecheck > history-typecheck.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: history-diagnostics
          path: history-typecheck.log
