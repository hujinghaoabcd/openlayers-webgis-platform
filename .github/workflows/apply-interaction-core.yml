name: Apply interaction core

on:
  push:
    branches:
      - agent/interaction-core
    paths:
      - 'scripts/apply-interaction-core.py'
      - '.github/workflows/apply-interaction-core.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/interaction-core
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/apply-interaction-core.py
      - name: Commit generated interaction core
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/core/src
          git commit -m "feat: add managed interaction collection"
          git push origin HEAD:agent/interaction-core
