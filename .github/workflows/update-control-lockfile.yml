name: Update control lockfile

on:
  push:
    branches:
      - agent/control-core
    paths:
      - 'apps/examples/package.json'
      - 'packages/controls/package.json'
      - '.github/workflows/update-control-lockfile.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/control-core
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --lockfile-only --no-frozen-lockfile
      - name: Commit lockfile
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: refresh control workspace lockfile"
          git push origin HEAD:agent/control-core
