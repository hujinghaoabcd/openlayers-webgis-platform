name: Overlay diagnostics

on:
  pull_request:
    branches:
      - main

jobs:
  diagnose:
    if: github.head_ref == 'agent/overlay-core'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Capture diagnostics
        run: |
          pnpm typecheck > overlay-typecheck.txt 2>&1 || true
          pnpm --filter @omap/core test > overlay-core-tests.txt 2>&1 || true
          pnpm --filter @omap/widgets test > overlay-widget-tests.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: overlay-diagnostics
          path: |
            overlay-typecheck.txt
            overlay-core-tests.txt
            overlay-widget-tests.txt
