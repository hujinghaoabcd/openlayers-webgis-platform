name: Refresh Layer Lockfile

on:
  push:
    branches:
      - agent/layer-sources-formats

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/layer-sources-formats
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
      - run: pnpm install --lockfile-only --no-frozen-lockfile
      - name: Commit lockfile when changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh workspace lockfile"
            git push origin HEAD:agent/layer-sources-formats
          fi
