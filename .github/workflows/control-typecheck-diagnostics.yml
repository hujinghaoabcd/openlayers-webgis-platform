name: Control typecheck diagnostics

on:
  push:
    branches:
      - agent/control-core

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Capture typecheck output
        shell: bash
        run: pnpm typecheck > typecheck.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: control-typecheck-log
          path: typecheck.log
